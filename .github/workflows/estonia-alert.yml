name: Estonia risk alerts

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  check-news:
    runs-on: ubuntu-latest

    steps:
      - name: Run alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import json
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET

          BOT_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
          CHAT_ID = os.environ["TELEGRAM_CHAT_ID"]

          FEEDS = [
              "https://news.google.com/rss/search?q=Estonia+OR+Baltic+security&hl=en-US&gl=US&ceid=US:en",
          ]

          TRIGGERS = [
              "evacuation",
              "estonia",
              "leave country",
              "leave estonia",
              "diplomats leaving",
              "embassy staff withdrawn",
              "airspace closed",
              "border closure",
              "state of emergency",
              "military escalation baltic",
          ]

          def fetch(url):
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req) as r:
                  return r.read()

          def parse(xml):
              root = ET.fromstring(xml)
              items = []
              for item in root.findall(".//item"):
                  title = item.findtext("title") or ""
                  link = item.findtext("link") or ""
                  text = (title).lower()
                  items.append((title, link, text))
              return items

          def send(msg):
              url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
              data = urllib.parse.urlencode({
                  "chat_id": CHAT_ID,
                  "text": msg
              }).encode()
              urllib.request.urlopen(url, data=data)

          for feed in FEEDS:
              items = parse(fetch(feed))
              for title, link, text in items[:10]:
                  for t in TRIGGERS:
                      if t in text:
                          send(f"🚨 ALERT\n{title}\n{link}")
                          raise SystemExit
          PY
          
